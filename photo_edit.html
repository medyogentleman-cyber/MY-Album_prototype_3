<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>写真編集 - MYアルバム</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-height: 80px;
        }

        body { overflow: hidden; background: #000; color: #FFF; -webkit-tap-highlight-color: transparent; width: 100vw; }
        .app-container { max-width: 430px; margin: 0 auto; height: 100vh; position: relative; display: flex; flex-direction: column; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        /* Header */
        .e-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .back-btn { font-size: 24px; color: var(--text-main); text-decoration: none; width: 32px; }
        .h-info { flex: 1; text-align: center; }
        .h-title { font-size: 14px; font-weight: 900; line-height: 1.2; }
        .h-subtitle { font-size: 10px; font-weight: 800; color: var(--primary-color); text-transform: uppercase; letter-spacing: 0.5px; }
        .h-save { font-size: 13px; font-weight: 800; color: #FFF; padding: 8px 16px; border-radius: 20px; background: var(--primary-color); cursor: pointer; border: none; box-shadow: 0 4px 12px rgba(255,107,0,0.2); }

        /* Preview Area */
        .preview-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #EAE8F2;}
        .preview-img { width: 100%; height: 100%; object-fit: contain; transform-origin: center; transition: filter 0.2s, transform 0.2s; }
        
        /* Layer System for Text */
        .text-layer { position: absolute; padding: 10px; cursor: move; border: 2px dashed transparent; user-select: none; white-space: nowrap; transition: 0.1s border; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); }
        .text-layer.active { border-color: var(--primary-color); background: rgba(255,107,0,0.1); border-radius: 8px; }
        .text-layer .delete-node { position: absolute; top: -12px; right: -12px; width: 24px; height: 24px; background: #FF3B30; color: #FFF; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; transform: scale(0.8); }
        .text-layer.active .delete-node { display: flex; }
        
        .layer-content { font-size: inherit; font-weight: inherit; color: inherit; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Bottom Controls Container */
        .controls-area { background: #FFF; border-top: 1px solid var(--border-color); padding: 16px 16px calc(var(--nav-height) + 16px); display: flex; flex-direction: column; gap: 16px; z-index: 20; border-radius: 24px 24px 0 0; margin-top: -16px; position:relative; box-shadow: 0 -4px 24px rgba(0,0,0,0.05); overflow-y: auto; flex-shrink: 0; }

        /* Tool Tabs */
        .tool-tabs { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
        .tool-tabs::-webkit-scrollbar { display: none; }
        .tab { font-size: 12px; font-weight: 800; color: var(--text-sub); padding: 8px 14px; border-radius: 12px; cursor: pointer; white-space: nowrap; transition: 0.2s; background: var(--bg-color); border: 1px solid transparent; }
        .tab.active { background: #FFF; color: var(--primary-color); border-color: var(--primary-light); box-shadow: 0 4px 12px rgba(255,107,0,0.1); }

        /* Sliders / Options area */
        .option-panel { display: none; animation: slideUp 0.3s ease; }
        .option-panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slider-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .s-label { font-size: 12px; font-weight: 800; color: var(--text-main); width: 60px; }
        input[type=range] { flex: 1; accent-color: var(--primary-color); height: 4px; border-radius: 2px; outline: none; }

        /* Filter Grid */
        .filter-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
        .f-item { width: 64px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .f-thumb { width: 64px; height: 64px; border-radius: 12px; background: #EAE8F2; overflow: hidden; border: 2px solid transparent; transition: 0.2s; }
        .f-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .f-item.active .f-thumb { border-color: var(--primary-color); filter: drop-shadow(0 4px 8px rgba(255,107,0,0.3)); }
        .f-name { font-size: 10px; font-weight: 800; color: var(--text-sub); }
        /* Commit Button in panel */
        .panel-commit { width: 100%; padding: 12px; background: var(--primary-light); color: var(--primary-color); border: none; border-radius: 12px; font-size: 13px; font-weight: 900; cursor: pointer; margin-top: 8px; }

        /* Draggable Crop UI */
        .crop-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 5; }
        .crop-box { position: absolute; border: 2px solid #FFF; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); pointer-events: auto; cursor: move; display: flex; align-items: center; justify-content: center; }
        .crop-box::after { content: ''; width: 100%; height: 100%; border: 1px solid rgba(255,255,255,0.3); background: repeating-linear-gradient(0deg, transparent, transparent 33.3%, rgba(255,255,255,0.2) 33.3%, rgba(255,255,255,0.2) 33.6%), repeating-linear-gradient(90deg, transparent, transparent 33.3%, rgba(255,255,255,0.2) 33.3%, rgba(255,255,255,0.2) 33.6%); }
        
        /* Premium Share Button at Bottom */
        .share-btn-wrap { position: fixed; bottom: calc(var(--nav-height) + 16px); left: 50%; transform: translateX(-50%); z-index: 150; animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-share-main { background: linear-gradient(135deg, #FF6B00, #FF3B30); color: #FFF; border: none; padding: 14px 40px; border-radius: 30px; font-size: 15px; font-weight: 900; box-shadow: 0 8px 24px rgba(255,59,48,0.4); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; border: 2px solid rgba(255,255,255,0.2); }
        .btn-share-main:active { transform: scale(0.95); box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        @keyframes bounceIn { from { opacity: 0; transform: translate(-50%, 20px) scale(0.8); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }

        /* Modern Tool Commit */
        .commit-bar { display: flex; gap: 10px; margin-top: 16px; }
        .btn-commit-sub { flex: 1; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-commit-apply { background: var(--primary-color); color: #FFF; }
        .btn-commit-cancel { background: #F5F5F7; color: var(--text-sub); }

        /* Unified Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background-color: rgba(255,255,255,0.95); backdrop-filter: blur(10px); height: var(--nav-height); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); text-decoration: none; font-size: 10px; font-weight: 700; gap: 4px; transition:0.2s; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-fab { background-color: var(--primary-color); color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 4px 12px rgba(255,107,0,0.3); font-size: 32px; line-height: 1; text-decoration: none; border: 4px solid var(--bg-color); }
    </style>
</head>

                    <div class="f-item" onclick="setFilter('hue-rotate(90deg)', this)"><div class="f-thumb"><img src="images/live.png" style="filter:hue-rotate(90deg)"></div><span class="f-name">Cool</span></div>
                    <div class="f-item" onclick="setFilter('brightness(1.2) saturate(1.5)', this)"><div class="f-thumb"><img src="images/live.png" style="filter:brightness(1.2) saturate(1.5)"></div><span class="f-name">Vivid</span></div>

    <script>
        let bgFilter = { bright: 100, contrast: 100, saturate: 100 };
        let activePreset = 'none';
        let activeLayer = null;

        function switchTool(tool, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            document.querySelectorAll('.option-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`pnl-${tool}`).classList.add('active');
            
            const cropOverlay = document.getElementById('cropOverlay');
            cropOverlay.style.display = (tool === 'crop') ? 'block' : 'none';

            if (tool !== 'text') deselectAllLayers();
        }

        /* --- Draggable Crop Box Logic --- */
        const cropBox = document.getElementById('cropBox');
        let isDraggingCrop = false;
        let cStartX, cStartY, cStartL, cStartT;

        const moveBox = (e) => {
            if (!isDraggingCrop) return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            cropBox.style.left = (cStartL + (x - cStartX)) + 'px';
            cropBox.style.top = (cStartT + (y - cStartY)) + 'px';
            if(e.cancelable) e.preventDefault();
        };
        const stopBox = () => { isDraggingCrop = false; };

        cropBox.addEventListener('mousedown', e => {
            isDraggingCrop = true;
            cStartX = e.clientX; cStartY = e.clientY;
            cStartL = cropBox.offsetLeft; cStartT = cropBox.offsetTop;
            e.stopPropagation();
        });
        cropBox.addEventListener('touchstart', e => {
            isDraggingCrop = true;
            cStartX = e.touches[0].clientX; cStartY = e.touches[0].clientY;
            cStartL = cropBox.offsetLeft; cStartT = cropBox.offsetTop;
            e.stopPropagation();
        }, {passive:false});

        window.addEventListener('mousemove', moveBox);
        window.addEventListener('touchmove', moveBox, {passive:false});
        window.addEventListener('mouseup', stopBox);
        window.addEventListener('touchend', stopBox);

        function setCropRatio(w, h) {
            if (w === 0) {
                cropBox.style.width = '240px'; cropBox.style.height = '180px';
            } else {
                const base = 220;
                cropBox.style.width = base + 'px';
                cropBox.style.height = (base * (h/w)) + 'px';
            }
            cropBox.style.left = '50%'; cropBox.style.top = '50%';
            cropBox.style.transform = 'translate(-50%, -50%)';
        }

        /* --- Filter & Adjust Logic --- */
        function applyFilters() {
            bgFilter.bright = document.getElementById('bright').value;
            bgFilter.contrast = document.getElementById('contrast').value;
            bgFilter.saturate = document.getElementById('saturate').value;
            updatePreviewStyles();
        }

        function setFilter(f, el) {
            document.querySelectorAll('.f-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            activePreset = f === 'none' ? '' : f;
            updatePreviewStyles();
        }

        function updatePreviewStyles() {
            const img = document.getElementById('imgPreview');
            const adj = `brightness(${bgFilter.bright}%) contrast(${bgFilter.contrast}%) saturate(${bgFilter.saturate}%)`;
            img.style.filter = `${adj} ${activePreset}`;
        }

        function resetAdjust() {
            document.getElementById('bright').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturate').value = 100;
            applyFilters();
            showToast("調整をリセットしました");
        }

        /* --- Text Layer Logic --- */
        function addTextLayer() {
            const val = document.getElementById('newText').value || "TEXT";
            const layer = document.createElement('div');
            layer.className = 'text-layer';
            layer.style.cssText = "top:50%; left:50%; font-size:40px; font-weight:900; color:#FFFFFF; font-family:'Noto Sans JP', sans-serif;";
            layer.innerHTML = `
                <div class="layer-content">${val}</div>
                <div class="delete-node" onclick="this.parentElement.remove(); deselectAllLayers(); event.stopPropagation();">✕</div>
            `;
            layer.onclick = (e) => { e.stopPropagation(); selectLayer(layer); };
            setupDrag(layer);
            document.getElementById('pArea').appendChild(layer);
            selectLayer(layer);
            document.getElementById('newText').value = "";
        }

        function selectLayer(layer) {
            deselectAllLayers();
            activeLayer = layer;
            layer.classList.add('active');
            document.getElementById('textControls').style.display = 'flex';
            document.getElementById('textColor').value = rgbToHex(layer.style.color);
            document.getElementById('textSize').value = parseInt(layer.style.fontSize);
            document.getElementById('fontFamily').value = layer.style.fontFamily || "'Noto Sans JP', sans-serif";
            document.getElementById('btn-bold').classList.toggle('active', layer.style.fontWeight === '900');
        }

        function deselectAllLayers() {
            document.querySelectorAll('.text-layer').forEach(l => l.classList.remove('active'));
            activeLayer = null;
            document.getElementById('textControls').style.display = 'none';
        }

        function updateTextStyle() {
            if (!activeLayer) return;
            activeLayer.style.color = document.getElementById('textColor').value;
            activeLayer.style.fontSize = document.getElementById('textSize').value + 'px';
            activeLayer.style.fontFamily = document.getElementById('fontFamily').value;
        }

        function toggleWeight() {
            if (!activeLayer) return;
            const isBold = activeLayer.style.fontWeight === '900';
            activeLayer.style.fontWeight = isBold ? '400' : '900';
            document.getElementById('btn-bold').classList.toggle('active', !isBold);
        }

        function setupDrag(el) {
            let drg = false, sX, sY, iX, iY;
            const start = (e) => {
                drg = true;
                const p = e.touches ? e.touches[0] : e;
                sX = p.clientX; sY = p.clientY;
                iX = el.offsetLeft; iY = el.offsetTop;
                selectLayer(el);
                e.stopPropagation();
            };
            const move = (e) => {
                if (!drg) return;
                const p = e.touches ? e.touches[0] : e;
                el.style.left = (iX + (p.clientX - sX)) + 'px';
                el.style.top = (iY + (p.clientY - sY)) + 'px';
                if(e.cancelable) e.preventDefault();
            };
            const end = () => drg = false;
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start, {passive:false});
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, {passive:false});
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        }

        function rgbToHex(rgb) {
            if (!rgb || !rgb.startsWith('rgb')) return rgb || '#FFFFFF';
            const m = rgb.match(/\d+/g);
            return "#" + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('').toUpperCase();
        }

        function commitChanges(name) {
            deselectAllLayers();
            showToast(`✓ ${name}をキャンバスに適用しました`);
        }

        function finishEdit() {
            deselectAllLayers();
            document.getElementById('finalPreview').src = document.getElementById('imgPreview').src;
            document.getElementById('finishModal').style.display = 'flex';
        }

        function postToSNS(platform) {
            showToast(`${platform}へ投稿しました！`);
            setTimeout(() => location.href='my_albums.html', 1500);
        }

        function saveToAlbum() {
            showToast("MYアルバムに保存しました");
            setTimeout(() => location.href='my_albums.html', 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</script>
<script src="nav.js"></script>
<script src="i18n.js"></script>
</body>
