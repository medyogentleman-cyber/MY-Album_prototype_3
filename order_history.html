<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MYアルバム - 注文履歴</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --nav-height: 80px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
            --surface: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #F8F9FB; color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 430px; margin: 0 auto; background: #F8F9FB; min-height: 100vh; padding-bottom: calc(var(--nav-height) + 20px); position: relative; }
        
        .dash-header { padding: 12px 16px; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); z-index: 50; box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .header-title { font-size: 16px; font-weight: 900; color: var(--text-main); }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #F0F2F5; display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--text-main); }

        .orders-list { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        
        .order-card { background: white; border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.03); overflow: hidden; }
        .order-header { padding: 16px; cursor: pointer; position: relative; transition: 0.2s; }
        .order-header:active { background: #F8F9FB; }
        .order-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-date { font-size: 12px; color: var(--text-sub); font-weight: 600; }
        .order-id { font-size: 11px; color: var(--text-sub); background: #F0F2F5; padding: 2px 6px; border-radius: 6px; font-family: monospace; }
        .order-total { font-size: 16px; font-weight: 900; color: var(--text-main); }
        
        .status-badge { font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }
        .status-badge.payment { background: #E8F5E9; color: #2E7D32; }
        .status-badge.preparing { background: #FFF3E0; color: #E65100; }
        .status-badge.shipped { background: #E3F2FD; color: #1565C0; }

        .order-details { display: none; padding: 0 16px 16px; border-top: 1px dashed rgba(0,0,0,0.08); background: #FAFAFA; }
        .order-card.open .order-details { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .items-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
        .item-row { display: flex; gap: 12px; align-items: center; }
        .item-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #FFF; border: 1px solid rgba(0,0,0,0.05); }
        .item-info { flex: 1; }
        .item-name { font-size: 12px; font-weight: 800; color: var(--text-main); line-height: 1.3; margin-bottom: 2px; }
        .item-meta { font-size: 11px; color: var(--text-sub); font-weight: 600; display: flex; justify-content: space-between;}

        .address-box { margin-top: 16px; background: white; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .address-title { font-size: 11px; font-weight: 900; color: var(--text-sub); margin-bottom: 8px; }
        .address-text { font-size: 12px; line-height: 1.5; color: var(--text-main); font-weight: 600; }

        .empty-orders { text-align: center; padding: 60px 16px; color: var(--text-sub); font-size: 14px; font-weight: 600; }
        
        .arrow-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); transition: 0.3s; color: var(--text-sub); }
        .order-card.open .arrow-icon { transform: translateY(-50%) rotate(180deg); }

    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="dash-header">
            <a href="profile.html" class="back-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            </a>
            <div class="header-title">注文履歴</div>
            <div style="width:40px;"></div>
        </header>

        <div id="ordersList" class="orders-list"></div>
        <div id="emptyOrders" class="empty-orders" style="display:none;">
            <div style="font-size:40px; margin-bottom:16px;">📦</div>
            まだ注文履歴がありません。<br><br>
            <button onclick="location.href='store.html'" style="padding:10px 20px; border-radius:12px; background:var(--primary-color); color:white; font-weight:900; border:none; cursor:pointer;">ストアを見る</button>
        </div>

    </div>

    <script src="nav.js"></script>
    <script>
        function getStatusHtml(status) {
            switch(status) {
                case 'payment_completed': return '<div class="status-badge payment">💰 支払い完了</div>';
                case 'preparing': return '<div class="status-badge preparing">📦 発送準備中</div>';
                case 'shipped': return '<div class="status-badge shipped">🚚 発送済み</div>';
                default: return '<div class="status-badge payment">💰 支払い完了</div>';
            }
        }

        function toggleOrder(el) {
            el.parentElement.classList.toggle('open');
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('myStoreOrders')) || [];
            const list = document.getElementById('ordersList');
            const empty = document.getElementById('emptyOrders');
            
            if (orders.length === 0) {
                empty.style.display = 'block';
                return;
            }

            const addressData = JSON.parse(localStorage.getItem('myStoreAddress')) || { name:'-', zip:'-', pref:'', city:'-', line:'' };
            const fullAddress = `〒${addressData.zip}<br>${addressData.pref}${addressData.city}${addressData.line}<br>${addressData.name} 様`;

            orders.forEach(order => {
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div class="item-row">
                            <img src="${item.img}" class="item-img">
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-meta">
                                    <span>¥${item.price.toLocaleString()} × ${item.quantity}</span>
                                    <span style="font-weight:800; color:var(--text-main);">¥${(item.price * item.quantity).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                const html = `
                    <div class="order-card">
                        <div class="order-header" onclick="toggleOrder(this)">
                            <div class="order-row">
                                <div class="order-date">${order.date}</div>
                                <div class="order-id">${order.id}</div>
                            </div>
                            <div class="order-row" style="margin-bottom:0;">
                                ${getStatusHtml(order.status)}
                                <div class="order-total">¥${order.total.toLocaleString()}</div>
                            </div>
                            <svg class="arrow-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                        </div>
                        <div class="order-details">
                            <div class="items-list">
                                ${itemsHtml}
                            </div>
                            <div class="address-box">
                                <div class="address-title">お届け先</div>
                                <div class="address-text">${fullAddress}</div>
                            </div>
                        </div>
                    </div>
                `;
                list.innerHTML += html;
            });
        }

        window.onload = function() {
            loadOrders();
        };
    </script>
</body>
</html>
